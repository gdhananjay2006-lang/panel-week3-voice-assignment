<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Panel — Voice Test Client</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    background: #0D1B2E;
    color: #F0F4F8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  button {
    font-size: 18px;
    padding: 16px 32px;
    border-radius: 12px;
    border: none;
    background: #2563EB;
    color: white;
    cursor: pointer;
    margin: 10px;
  }
  button:disabled { background: #64748B; cursor: not-allowed; }
  button.recording { background: #DC2626; }
  #log {
    width: 600px;
    max-width: 90vw;
    height: 300px;
    overflow-y: auto;
    background: #14233a;
    border-radius: 8px;
    padding: 12px;
    font-family: monospace;
    font-size: 13px;
    white-space: pre-wrap;
  }
  #typeBox {
    width: 600px;
    max-width: 90vw;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
  <h2>The Panel — Voice Test Client</h2>
  <p id="status">Status: Disconnected</p>

  <div>
    <button id="connectBtn">Connect to Proxy</button>
    <button id="recordBtn" disabled>🎤 Hold to Talk</button>
  </div>

  <input id="typeBox" placeholder="Or type a message and press Enter (e.g. 'what time is it?')" disabled>

  <div id="log"></div>

<script>
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const connectBtn = document.getElementById('connectBtn');
const recordBtn = document.getElementById('recordBtn');
const typeBox = document.getElementById('typeBox');

function log(msg) {
  const time = new Date().toLocaleTimeString();
  logEl.textContent += `[${time}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

let ws = null;
let audioContext = null;
let mediaStream = null;
let processor = null;

let playbackContext = null;
let playbackTime = 0;

function initPlayback() {
  if (!playbackContext) {
    playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    playbackTime = playbackContext.currentTime;
  }
}

function playPCM16(arrayBuffer) {
  initPlayback();
  const int16 = new Int16Array(arrayBuffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) {
    float32[i] = int16[i] / 32768;
  }
  const buffer = playbackContext.createBuffer(1, float32.length, 24000);
  buffer.copyToChannel(float32, 0);

  const source = playbackContext.createBufferSource();
  source.buffer = buffer;
  source.connect(playbackContext.destination);

  const now = playbackContext.currentTime;
  if (playbackTime < now) playbackTime = now;
  source.start(playbackTime);
  playbackTime += buffer.duration;
}

connectBtn.onclick = () => {
  ws = new WebSocket('ws://localhost:8000/ws');
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'Status: Connected';
    log('Connected to proxy server.');
    recordBtn.disabled = false;
    typeBox.disabled = false;
    connectBtn.disabled = true;
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'text') log('Gemini (text): ' + data.text);
        else if (data.type === 'turnComplete') log('--- turn complete ---');
        else log('Received: ' + event.data);
      } catch {
        log('Received (raw text): ' + event.data);
      }
    } else {
      log('Received audio chunk (' + event.data.byteLength + ' bytes), playing...');
      playPCM16(event.data);
    }
  };

  ws.onerror = (e) => log('WebSocket error (see browser console for details).');
  ws.onclose = () => {
    statusEl.textContent = 'Status: Disconnected';
    log('Disconnected from proxy.');
    recordBtn.disabled = true;
    typeBox.disabled = true;
    connectBtn.disabled = false;
  };
};

typeBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && typeBox.value.trim()) {
    const msg = typeBox.value.trim();
    log('You (text): ' + msg);
    ws.send(msg);
    typeBox.value = '';
  }
});

async function startRecording() {
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 16000 } });
  audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  const source = audioContext.createMediaStreamSource(mediaStream);

  processor = audioContext.createScriptProcessor(4096, 1, 1);
  source.connect(processor);
  processor.connect(audioContext.destination);

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    const pcm16 = new Int16Array(input.length);
    for (let i = 0; i < input.length; i++) {
      const s = Math.max(-1, Math.min(1, input[i]));
      pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(pcm16.buffer);
    }
  };

  log('Recording started. Speak now...');
}

function stopRecording() {
  if (processor) { processor.disconnect(); processor = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  log('Recording stopped.');
}

recordBtn.addEventListener('mousedown', () => {
  recordBtn.classList.add('recording');
  startRecording();
});
recordBtn.addEventListener('mouseup', () => {
  recordBtn.classList.remove('recording');
  stopRecording();
});
</script>
</body>
</html>
